# Below is a configuration of the Streamlit (st) Application

[global]

    # by default, st checks if the Python watchdog module is available and,
    # if not (highly recommended), prints a warning asking you to install
    disableWatchdogWarning = false

    # configure the ability to share apps to the cloud, can be any of the
    # valid values: "off" - turn off sharing, "s3" - share in Amazon S3, etc.
    sharingMode = "off"

    # lefel of logging, configure logging style seperately
    logLevel = "debug"

[client]

    # enable/disable st.cache
    caching = true

[runner]

    # use tracer to stop/pause script for debugging
    installTracer = false

[server]

    # list of directories that should not be watched for changes
    folderWatchBlacklist = ['.git/', '.github/']

    # enable cross-origin sharing of st application
    enableCORS = false

[browser]

    # send usage statistics to st developers
    gatherUsageStats = false
